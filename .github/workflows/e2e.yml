name: E2E — Batch 3 Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Install headless Chromium system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxinerama1 \
            libxcursor1 \
            libnss3 \
            libnspr4

      - name: Build client
        run: npx vite build --config vite.config.ts
        env:
          NODE_ENV: production

      - name: Copy build output to server directory
        run: cp -r dist/public server/public

      - name: Start app server (background)
        run: |
          DATABASE_URL="postgresql://localhost:5432/ci" \
          NODE_ENV=production \
          npx tsx server/index.ts &
          sleep 5
          echo "Server PID: $!"

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/pricing | grep -q 200; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting... attempt $i"
            sleep 2
          done
          echo "Server did not start in time"
          exit 1

      - name: Run Playwright tests
        run: npx playwright test e2e/verify-batch3.spec.ts --reporter=list

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7